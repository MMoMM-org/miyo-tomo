# vault-config.yaml — Example / Reference Configuration
# version: 1.0
#
# This file documents the COMPLETE vault-config.yaml schema with MiYo profile
# defaults as example values.
#
# Usage:
#   - Copy to your instance's config/ directory as vault-config.yaml
#   - Fill in values that match your vault structure
#   - Fields left at their profile default can be omitted (Tomo falls back to profile)
#   - Fields set to null are intentionally disabled (no fallback to profile)
#
# Generation:
#   Phase 1: Install script produces a minimal config (profile, concepts, lifecycle)
#   Phase 2: /explore-vault enriches with frontmatter, tags, callouts, relationships

# ──────────────────────────────────────────────────────────────────────────────
# Schema Identity
# ──────────────────────────────────────────────────────────────────────────────

# Validated at session start. If Tomo requires a newer schema version it will
# present a migration diff before proceeding.
schema_version: 1

# Which profile to load as baseline. Available: miyo, lyt, para, custom.
# L3 (this file) always wins over L2 (profile) — omit a field to fall back to profile.
profile: "miyo"
profile_version: "1.0"

# ──────────────────────────────────────────────────────────────────────────────
# Concept Mapping
# ──────────────────────────────────────────────────────────────────────────────
# Maps Tomo's abstract concepts to your vault's actual folder paths.
# Override only the concepts that differ from your profile defaults.

concepts:
  # Where new, unprocessed items land
  inbox: "+/"

  # Evergreen / atomic notes — single-idea permanent notes
  atomic_note: "Atlas/202 Notes/"

  # Map of Content — MOC notes. Discovery uses BOTH folder paths AND tags.
  # Notes tagged with any of the listed tags are treated as MOCs regardless of
  # their folder location (useful for sub-MOCs scattered throughout the vault).
  map_note:
    paths:
      - "Atlas/200 Maps/"
    tags:
      - "type/others/moc"

  # Calendar / daily notes — one base_path with per-granularity sub-paths
  calendar:
    base_path: "Calendar/"
    granularities:
      daily:
        enabled: true
        path: "Calendar/Days/"
      weekly:
        enabled: false
        path: null
      monthly:
        enabled: false
        path: null
      quarterly:
        enabled: false
        path: null
      yearly:
        enabled: false
        path: null

  # Active projects
  project: "Efforts/Projects/"

  # Ongoing areas of responsibility
  area: "Efforts/Areas/"

  # Source / reference material
  source: "Atlas/Sources/"

  # Note templates (Obsidian template folder)
  template: "X/900 Support/Templates/"

  # Attachments, images, and other binary assets
  asset: "Atlas/290 Assets/295 Attachments/"

# ──────────────────────────────────────────────────────────────────────────────
# Naming
# ──────────────────────────────────────────────────────────────────────────────
# Controls how Tomo refers to concepts in proposals and how calendar files
# are named. Labels are human-readable display names; patterns follow Moment.js.

naming:
  # Display labels used in instruction sets and proposals
  labels:
    map_note: "MOC"
    atomic_note: "Note"
    inbox_item: "Inbox Item"
    project: "Project"
    source: "Source"

  # Filename patterns per calendar granularity (Moment.js format tokens)
  calendar_patterns:
    daily: "YYYY-MM-DD"
    weekly: "YYYY-[W]ww"
    monthly: "YYYY-MM"
    quarterly: "YYYY-[Q]Q"
    yearly: "YYYY"

# ──────────────────────────────────────────────────────────────────────────────
# Lifecycle
# ──────────────────────────────────────────────────────────────────────────────
# Tomo tags notes it has processed with a lifecycle tag under this prefix.
# Example: "MiYo-Tomo/processed/2026-04-10"

lifecycle:
  tag_prefix: "MiYo-Tomo"

# ──────────────────────────────────────────────────────────────────────────────
# Templates
# ──────────────────────────────────────────────────────────────────────────────
# Maps concept types to Obsidian template files (relative to base_path).
# Tomo verifies these files exist via Kado at session start.

templates:
  base_path: "X/900 Support/Templates/"
  mapping:
    atomic_note: "Atomic Note.md"
    map_note: "MOC.md"
    daily: "Daily Note.md"
    weekly: "Weekly Note.md"
    monthly: "Monthly Note.md"
    yearly: "Yearly Note.md"
    project: "Project.md"
    source: "Source.md"
  # Optional: custom token overrides applied before standard token resolution
  # custom_tokens:
  #   - token: "my_token"
  #     value: "static value"

# ──────────────────────────────────────────────────────────────────────────────
# Frontmatter Schema
# ──────────────────────────────────────────────────────────────────────────────
# Defines which frontmatter fields Tomo reads, writes, and validates.
#
# strict: true  → Tomo refuses to write notes missing required fields
# strict: false → Tomo warns but proceeds
#
# Each field entry:
#   key     — YAML key name as it appears in the note (e.g. "UUID", "tags")
#   token   — Template token that resolves this field (e.g. "uuid", "title")
#   format  — Expected format for generated values (e.g. "YYYY-MM-DD")
#   type    — Expected YAML type: string, number, boolean, list, date
#   default — Default value for optional fields when token cannot resolve

frontmatter:
  strict: true

  required:
    - key: "UUID"
      token: "uuid"
      format: "YYYYMMDDHHmmss"
      type: "string"
    - key: "DateStamp"
      token: "datestamp"
      format: "YYYY-MM-DD"
      type: "date"
    - key: "Updated"
      token: "updated"
      format: "YYYY-MM-DD HH:mm"
      type: "string"
    - key: "title"
      token: "title"
      type: "string"
    - key: "tags"
      token: "tags"
      type: "list"

  optional:
    - key: "locale"
      token: "locale"
      type: "string"
      default: "de"
    - key: "Vault"
      token: "vault"
      type: "string"
      default: "Privat"
    - key: "VaultVersion"
      token: "vault_version"
      type: "string"
      default: "2"
    - key: "Summary"
      token: "summary"
      type: "string"
    - key: "aliases"
      token: "aliases"
      type: "list"
    - key: "banner"
      token: "banner"
      type: "string"

# ──────────────────────────────────────────────────────────────────────────────
# Relationships
# ──────────────────────────────────────────────────────────────────────────────
# How Tomo detects and writes parent/peer links between notes.
# Tomo does not depend on Dataview — markers are just text patterns.
#
# marker        — prefix that identifies this relationship (used for read + write)
# format        — template string for writing; must contain {{link}}
# position      — where in the note: connect_callout | frontmatter |
#                 top_of_body | end_of_frontmatter
# location_type — inline (body pattern match) or frontmatter (YAML key)
# multi         — whether multiple links are allowed
# separator     — how multiple links are joined (default: ", ")

relationships:
  parent:
    marker: "up::"
    format: "up:: {{link}}"
    position: "connect_callout"
    location_type: "inline"
    multi: true
    separator: ", "
  peer:
    marker: "related::"
    format: "related:: {{link}}"
    position: "connect_callout"
    location_type: "inline"
    multi: true
    separator: ", "

# ──────────────────────────────────────────────────────────────────────────────
# Tag Taxonomy
# ──────────────────────────────────────────────────────────────────────────────
# Describes the user's hierarchical tag structure. Tomo uses this to propose
# tags that match existing vault conventions.
#
# Each prefix entry has FOUR semantic axes (all required):
#   description   — what this prefix is for
#   known_values  — observed values under this prefix (full paths beyond the prefix)
#   wildcard      — true: Tomo may invent new values under this prefix
#                   false: only known_values may be used
#   proposable    — true: Tomo may actively propose this prefix for new notes
#                   false: Tomo leaves this prefix alone (external taxonomies
#                   like Raindrop/, Readwise/, or lifecycle tags Tomo does not
#                   manage). `required_for` still wins — proposable=false +
#                   required_for=[...] means values are set from known_values
#                   without invention.
#   required_for  — concept types that must have at least one tag in this prefix
#
# Managed by: scripts/vault-config-writer.py tags (enforces the schema in
# tomo/schemas/vault-config-tags.schema.json). Do not hand-edit.

tags:
  prefixes:
    type:
      description: "Note type (structural)"
      known_values:
        - "note/normal"
        - "others/moc"
      wildcard: false
      proposable: true
      required_for:
        - atomic_note
        - map_note

    status:
      description: "Note status in the thinking process"
      known_values:
        - "inwork/💭"
        - "done/✅"
      wildcard: true
      proposable: true
      required_for: []

    topic:
      description: "Topic area (free-form, hierarchical)"
      known_values:
        - "knowledge/lyt"
        - "knowledge/miyo"
        - "knowledge/personal"
        - "applied/ai"
        - "applied/docker"
        - "applied/tools"
      wildcard: true
      proposable: true
      required_for: []

    projects:
      description: "Project association (Dewey-coded)"
      known_values:
        - "60-00"
        - "60-00/60-06"
      wildcard: true
      proposable: true
      required_for:
        - project

    Raindrop:
      description: "Raindrop.io import tags — external taxonomy; Tomo does not propose these."
      known_values:
        - "Obsidian"
        - "japan"
      wildcard: false
      proposable: false
      required_for: []

# ──────────────────────────────────────────────────────────────────────────────
# Callout Mapping
# ──────────────────────────────────────────────────────────────────────────────
# How Tomo classifies Obsidian callouts (> [!name] blocks).
#
# enabled: false → Tomo ignores all callouts (treat content as flat markdown)
# enabled: true  → Tomo reads callout types and respects categories below
#
# Categories:
#   editable  — Tomo may read, insert, or update content inside
#   protected — Read-only (DataviewJS queries, auto-generated content)
#   ignore    — Skip entirely (decorative, no semantic value)
#
# Default for any callout NOT listed: protected (safe — don't touch unknown callouts)

callouts:
  enabled: true

  editable:
    connect:  "Navigation breadcrumbs (up:: / related:: links)"
    anchor:   "Overview section introduction"
    blocks:   "Key Concepts section"
    video:    "Action Items / Tasks"
    calendar: "Recent Updates"
    puzzle:   "Related Topics"
    compass:  "Suggestions and things to explore"

  protected:
    boxes:    "Unrequited Notes (DataviewJS query output)"
    shell:    "Same-tag unmentioned (DataviewJS query output)"
    keaton:   "Title-match notes (DataviewJS query output)"

  ignore:
    weather:  "Auto-generated weather widget (decorative)"
    divider:  "Visual separator, no semantic content"

# ──────────────────────────────────────────────────────────────────────────────
# Protected Patterns
# ──────────────────────────────────────────────────────────────────────────────
# Code block fences that Tomo must never modify. Any block opened with one of
# these strings is treated as protected — Tomo will read past it but never write
# inside it.

protected_patterns:
  - "```dataviewjs"
  - "```dataview"
  - "```folder-overview"

# ──────────────────────────────────────────────────────────────────────────────
# Tomo Settings
# ──────────────────────────────────────────────────────────────────────────────
# Runtime behaviour controls for Tomo itself (separate from vault schema).

tomo:
  suggestions:
    # Tag-prefix allow/deny is driven per-prefix via `tags.prefixes.*.proposable`
    # (see "Tag Taxonomy" above). The old top-level `proposable_tag_prefixes`
    # and `excluded_tag_prefixes` lists were retired 2026-04-21 — a single
    # source of truth keeps classification coherent.

    # Maximum concurrent Phase-B subagents during /inbox fan-out. Range 1-5.
    parallel: 5

# ──────────────────────────────────────────────────────────────────────────────
# Trackers
# ──────────────────────────────────────────────────────────────────────────────
# Declares tracker fields Tomo reads and proposes updates for in daily notes.
# Two sub-sections mirror typical daily-note structure:
#   today_fields   — checked during the day (boolean or scale trackers)
#   end_of_day_fields.fields — filled at day's end (reflective / summary fields)
#
# Per field:
#   name              — exact field name / label as it appears in the daily note
#   type              — boolean | integer | text (see tier-2 tracker spec)
#   syntax            — task_checkbox | inline_field | frontmatter
#   description       — one-sentence intent (used by classifier to avoid false positives)
#   positive_keywords — content words that should TRIGGER a match
#   negative_keywords — content words that SUPPRESS a match even if positives hit

trackers:
  daily_note_trackers:
    today_fields:
      - name: Sport
        type: boolean
        syntax: task_checkbox
        description: "Physical exercise the user actually did today (running, gym, yoga, cycling, swimming, hiking). Watching or reading about exercise does NOT qualify."
        positive_keywords: [ran, running, gelaufen, Lauf, workout, gym, yoga, cycled, Rad, Fahrrad, swim, schwimmen, hike, wandern, trained, trainiert, Sport gemacht]
        negative_keywords: [watched, video about, article about, gelesen über, video über, geplant, planning to, wollte]

      - name: WakeUpEnergy
        type: integer
        syntax: inline_field
        scale: "1-5"
        description: "How rested and energised the user felt upon waking (1=exhausted, 5=fully rested); reflects sleep quality and morning state."
        positive_keywords: [rested, ausgeschlafen, tired, müde, exhausted, erschöpft, energetic, energiegeladen, sluggish, träge, refreshed, erfrischt]
        negative_keywords: []

      - name: Meditation
        type: boolean
        syntax: task_checkbox
        description: "Whether the user actually practised meditation or mindfulness today (sitting, breathing, body scan). Passive calming activities do not count."
        positive_keywords: [meditiert, meditated, Meditation, mindfulness, Atemübung, breathing exercise, body scan, 10 Minuten Stille]
        negative_keywords: [wollte meditieren, forgot, vergessen, skipped, ausgelassen, video about]

      - name: Coding
        type: boolean
        syntax: inline_field
        description: "Whether the user wrote, reviewed, or meaningfully debugged code today — includes scripting and configuration work."
        positive_keywords: [coded, programmiert, Skript, script, refactored, debugged, deployed, commit, pull request, PR, gebaut, built, implemented]
        negative_keywords: [read about, gelesen, video about, planned, geplant, thought about]

    end_of_day_fields:
      fields:
        - name: Highlights
          type: text
          syntax: inline_field
          description: "One or two sentences capturing the most memorable or meaningful moment of the day — personal wins, discoveries, or experiences worth remembering."
          positive_keywords: [highlight, Highlight, bestes Erlebnis, best moment, proud of, stolz auf, memorable, unvergesslich, accomplished, geschafft, discovered, entdeckt]
          negative_keywords: [nichts besonderes, nothing special, boring, langweilig]

        - name: Sleep
          type: integer
          syntax: inline_field
          scale: "hours"
          description: "Hours of sleep the night before this daily note, used to correlate energy levels and productivity patterns."
          positive_keywords: [Stunden geschlafen, hours of sleep, schlief, slept, Schlaf, sleep, 7h, 8h, 6h]
          negative_keywords: [woke up, aufgewacht, couldn't sleep, nicht geschlafen]

        - name: Mood
          type: integer
          syntax: inline_field
          scale: "1-10"
          description: "Overall mood rating at end of day (1=very low, 10=excellent); captures emotional state for trend analysis."
          positive_keywords: [Stimmung, mood, gute Laune, glücklich, happy, content, zufrieden, great day, toller Tag]
          negative_keywords: [morgens, morning, woke up, aufgewacht]

# ──────────────────────────────────────────────────────────────────────────────
# Daily Log
# ──────────────────────────────────────────────────────────────────────────────
# Controls how Tomo appends linked inbox items to the daily note's log section.
# The log section is a chronological list of [[wikilinks]] to items processed
# that day, giving the user a daily timeline in their journal.

daily_log:
  enabled: true                 # set false to disable daily-log updates entirely
  section: "Daily Log"          # heading text Tomo searches for in the daily note
  heading_level: 1              # 1 = "# Daily Log"; 2 = "## Daily Log"
  time_extraction:
    enabled: true               # attempt to extract a time from the inbox item
    sources: [content, filename]  # priority order: try content first, then filename
    fallback: "append_end_of_day"  # what to do when no time found: append_end_of_day | append_start_of_day | skip_time
  link_format: "bullet"         # "bullet" → - [[stem]]; "plain" → [[stem]]
  cutoff_days: 30               # items older than this get no update_daily action (avoid touching stale notes)
  auto_create_if_missing:
    past: false                 # MVP: never auto-create past daily notes
    today: false                # MVP: never auto-create today's note (user creates manually)
    future: false               # MVP: never auto-create future notes
